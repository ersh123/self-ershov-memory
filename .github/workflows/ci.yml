name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Check whitespace
        run: git diff --check

      - name: Compile package
        run: python -m compileall -q __init__.py src scripts

      - name: Run tests
        run: pytest -q

      - name: Smoke Hermes plugin wrapper
        run: python scripts/hermes_plugin_smoke.py

      - name: Build package
        run: python -m build

      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/ershov-wheel-smoke
          /tmp/ershov-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/ershov-wheel-smoke/bin/ershov --help
          /tmp/ershov-wheel-smoke/bin/mnemos --help
          /tmp/ershov-wheel-smoke/bin/nightmem --help
          /tmp/ershov-wheel-smoke/bin/dreaming --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_mnemos --help

      - name: Smoke source distribution
        run: |
          python -m venv /tmp/ershov-sdist-smoke
          /tmp/ershov-sdist-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/ershov-sdist-smoke/bin/ershov --help
          /tmp/ershov-sdist-smoke/bin/mnemos --help
          /tmp/ershov-sdist-smoke/bin/nightmem --help
          /tmp/ershov-sdist-smoke/bin/dreaming --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_mnemos --help
