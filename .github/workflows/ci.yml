name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync locked dev environment
        run: uv sync --locked --extra dev --python "${{ matrix.python-version }}"

      - name: Check whitespace
        run: git diff --check

      - name: Lint GitHub Actions security
        run: uv run --locked --extra dev zizmor .github/workflows

      - name: Audit Python dependency vulnerabilities
        run: |
          uv run --locked --extra dev pip-audit . --strict --progress-spinner off
          uv run --locked --extra dev pip-audit --local --skip-editable --progress-spinner off

      - name: Lint Python dead code
        run: uv run --locked --extra dev ruff check --select F401,F841,E731 __init__.py src scripts tests fuzzers

      - name: Compile package
        run: uv run --locked --extra dev python -m compileall -q __init__.py src scripts

      - name: Run tests with coverage
        run: uv run --locked --extra dev pytest -q --cov=hermes_dreaming --cov=hermes_ershov --cov=hermes_mnemos --cov-report=term-missing:skip-covered --cov-report=xml --cov-fail-under=80

      - name: Run property-based tests directly
        run: uv run --locked --extra dev pytest -q tests/test_pbt.py

      - name: Smoke Hermes plugin wrapper
        run: uv run --locked --extra dev python scripts/hermes_plugin_smoke.py

      - name: Build package
        run: |
          uv run --locked --extra dev python -m build
          uv run --locked --extra dev twine check --strict dist/*.whl dist/*.tar.gz
          uv run --locked --extra dev python scripts/generate_release_sbom.py --output dist/hermes-ershov-sbom.spdx.json
          uv run --locked --extra dev python scripts/generate_release_manifest.py --dist dist
          uv run --locked --extra dev python scripts/generate_release_checksums.py --dist dist
          uv run --locked --extra dev python scripts/verify_release_artifacts.py --dist dist

      - name: Smoke installed wheel
        run: |
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov providers list
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov providers doctor --provider offline-marker --strict
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov providers doctor --provider offline-marker --from-systemd --strict
          mkdir -p /tmp/ershov-wheel-smoke-state
          printf '%s\n' 'HERMES_ERSHOV_PROVIDER="offline-marker"' 'DEEPSEEK_API_KEY="sk-ci-do-not-print"' > /tmp/ershov-wheel-nightly.env
          if uv run --no-cache --no-project --isolated --with dist/*.whl ershov providers doctor --provider deepseek --env-file /tmp/ershov-wheel-nightly.env --fix-plan --strict > /tmp/ershov-wheel-doctor.txt; then
            echo "expected deepseek env-file doctor to fail while wheel lacks the llm extra or provider selector mismatches"
            exit 1
          fi
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-doctor.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-doctor.txt; then
            echo "secret leaked from providers doctor fix-plan"
            exit 1
          fi
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov status --release-gate --state-root /tmp/ershov-wheel-smoke-state
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov status --release-gate --state-root /tmp/ershov-wheel-smoke-state --require-provider deepseek --provider-env-file /tmp/ershov-wheel-nightly.env --fix-plan > /tmp/ershov-wheel-status.txt
          grep -q 'Stable fix plan:' /tmp/ershov-wheel-status.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-status.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-status.txt; then
            echo "secret leaked from status release-gate fix-plan"
            exit 1
          fi
          if uv run --no-cache --no-project --isolated --with dist/*.whl ershov soak --state-root /tmp/ershov-wheel-smoke-state --since-hours 30 --min-successful 1 --require-timer --require-source systemd --require-commit "$GITHUB_SHA" --require-clean --require-provider deepseek --provider-env-file /tmp/ershov-wheel-nightly.env --fix-plan > /tmp/ershov-wheel-soak.txt; then
            echo "expected installed wheel soak gate to fail without scheduled-run evidence"
            exit 1
          fi
          grep -q '## Fix plan' /tmp/ershov-wheel-soak.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-soak.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-soak.txt; then
            echo "secret leaked from soak fix-plan"
            exit 1
          fi
          uv run --no-cache --no-project --isolated --with dist/*.whl ershov revert --help
          uv run --no-cache --no-project --isolated --with dist/*.whl hermes-ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.whl mnemos --help
          uv run --no-cache --no-project --isolated --with dist/*.whl nightmem --help
          uv run --no-cache --no-project --isolated --with dist/*.whl dreaming --help
          uv run --no-cache --no-project --isolated --with dist/*.whl python -m hermes_dreaming --help
          uv run --no-cache --no-project --isolated --with dist/*.whl python -m hermes_ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.whl python -m hermes_mnemos --help

      - name: Smoke source distribution
        run: |
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz hermes-ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz mnemos --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz nightmem --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz dreaming --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz python -m hermes_dreaming --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz python -m hermes_ershov --help
          uv run --no-cache --no-project --isolated --with dist/*.tar.gz python -m hermes_mnemos --help
