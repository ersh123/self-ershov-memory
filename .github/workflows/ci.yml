name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Check whitespace
        run: git diff --check

      - name: Compile package
        run: python -m compileall -q __init__.py src scripts

      - name: Run tests with coverage
        run: pytest -q --cov=hermes_dreaming --cov=hermes_ershov --cov=hermes_mnemos --cov-report=term-missing:skip-covered --cov-report=xml --cov-fail-under=80

      - name: Run property-based tests directly
        run: pytest -q tests/test_pbt.py

      - name: Smoke Hermes plugin wrapper
        run: python scripts/hermes_plugin_smoke.py

      - name: Build package
        run: python -m build

      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/ershov-wheel-smoke
          /tmp/ershov-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/ershov-wheel-smoke/bin/ershov --help
          /tmp/ershov-wheel-smoke/bin/ershov providers list
          /tmp/ershov-wheel-smoke/bin/ershov providers doctor --provider offline-marker --strict
          /tmp/ershov-wheel-smoke/bin/ershov providers doctor --provider offline-marker --from-systemd --strict
          mkdir -p /tmp/ershov-wheel-smoke-state
          printf '%s\n' 'HERMES_ERSHOV_PROVIDER="offline-marker"' 'DEEPSEEK_API_KEY="sk-ci-do-not-print"' > /tmp/ershov-wheel-nightly.env
          if /tmp/ershov-wheel-smoke/bin/ershov providers doctor --provider deepseek --env-file /tmp/ershov-wheel-nightly.env --fix-plan --strict > /tmp/ershov-wheel-doctor.txt; then
            echo "expected deepseek env-file doctor to fail while wheel lacks the llm extra or provider selector mismatches"
            exit 1
          fi
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-doctor.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-doctor.txt; then
            echo "secret leaked from providers doctor fix-plan"
            exit 1
          fi
          /tmp/ershov-wheel-smoke/bin/ershov status --release-gate --state-root /tmp/ershov-wheel-smoke-state
          /tmp/ershov-wheel-smoke/bin/ershov status --release-gate --state-root /tmp/ershov-wheel-smoke-state --require-provider deepseek --provider-env-file /tmp/ershov-wheel-nightly.env --fix-plan > /tmp/ershov-wheel-status.txt
          grep -q 'Stable fix plan:' /tmp/ershov-wheel-status.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-status.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-status.txt; then
            echo "secret leaked from status release-gate fix-plan"
            exit 1
          fi
          if /tmp/ershov-wheel-smoke/bin/ershov soak --state-root /tmp/ershov-wheel-smoke-state --since-hours 30 --min-successful 1 --require-timer --require-source systemd --require-commit "$GITHUB_SHA" --require-clean --require-provider deepseek --provider-env-file /tmp/ershov-wheel-nightly.env --fix-plan > /tmp/ershov-wheel-soak.txt; then
            echo "expected installed wheel soak gate to fail without scheduled-run evidence"
            exit 1
          fi
          grep -q '## Fix plan' /tmp/ershov-wheel-soak.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-wheel-soak.txt
          if grep -q 'sk-ci-do-not-print' /tmp/ershov-wheel-soak.txt; then
            echo "secret leaked from soak fix-plan"
            exit 1
          fi
          /tmp/ershov-wheel-smoke/bin/ershov revert --help
          /tmp/ershov-wheel-smoke/bin/mnemos --help
          /tmp/ershov-wheel-smoke/bin/nightmem --help
          /tmp/ershov-wheel-smoke/bin/dreaming --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-wheel-smoke/bin/python -m hermes_mnemos --help

      - name: Smoke source distribution
        run: |
          python -m venv /tmp/ershov-sdist-smoke
          /tmp/ershov-sdist-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/ershov-sdist-smoke/bin/ershov --help
          /tmp/ershov-sdist-smoke/bin/mnemos --help
          /tmp/ershov-sdist-smoke/bin/nightmem --help
          /tmp/ershov-sdist-smoke/bin/dreaming --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-sdist-smoke/bin/python -m hermes_mnemos --help
