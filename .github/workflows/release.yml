name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-assets:
    name: build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Verify
        run: |
          git diff --check
          python -m compileall -q __init__.py src scripts
          pytest -q --cov=hermes_dreaming --cov=hermes_ershov --cov=hermes_mnemos --cov-report=term-missing:skip-covered --cov-report=xml --cov-fail-under=80
          pytest -q tests/test_pbt.py
          python scripts/hermes_plugin_smoke.py

      - name: Build distributions
        run: python -m build

      - name: Smoke wheel
        run: |
          python -m venv /tmp/ershov-release-smoke
          /tmp/ershov-release-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/ershov-release-smoke/bin/ershov --help
          /tmp/ershov-release-smoke/bin/ershov providers list
          /tmp/ershov-release-smoke/bin/ershov providers doctor --provider offline-marker --strict
          /tmp/ershov-release-smoke/bin/ershov providers doctor --provider offline-marker --from-systemd --strict
          mkdir -p /tmp/ershov-release-smoke-state
          printf '%s\n' 'HERMES_ERSHOV_PROVIDER="offline-marker"' 'DEEPSEEK_API_KEY="sk-release-do-not-print"' > /tmp/ershov-release-nightly.env
          if /tmp/ershov-release-smoke/bin/ershov providers doctor --provider deepseek --env-file /tmp/ershov-release-nightly.env --fix-plan --strict > /tmp/ershov-release-doctor.txt; then
            echo "expected deepseek env-file doctor to fail while wheel lacks the llm extra or provider selector mismatches"
            exit 1
          fi
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-release-doctor.txt
          if grep -q 'sk-release-do-not-print' /tmp/ershov-release-doctor.txt; then
            echo "secret leaked from providers doctor fix-plan"
            exit 1
          fi
          /tmp/ershov-release-smoke/bin/ershov status --release-gate --state-root /tmp/ershov-release-smoke-state
          /tmp/ershov-release-smoke/bin/ershov status --release-gate --state-root /tmp/ershov-release-smoke-state --require-provider deepseek --provider-env-file /tmp/ershov-release-nightly.env --fix-plan > /tmp/ershov-release-status.txt
          grep -q 'Stable fix plan:' /tmp/ershov-release-status.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-release-status.txt
          if grep -q 'sk-release-do-not-print' /tmp/ershov-release-status.txt; then
            echo "secret leaked from status release-gate fix-plan"
            exit 1
          fi
          if /tmp/ershov-release-smoke/bin/ershov soak --state-root /tmp/ershov-release-smoke-state --since-hours 30 --min-successful 1 --require-timer --require-source systemd --require-commit "$GITHUB_SHA" --require-clean --require-provider deepseek --provider-env-file /tmp/ershov-release-nightly.env --fix-plan > /tmp/ershov-release-soak.txt; then
            echo "expected installed wheel soak gate to fail without scheduled-run evidence"
            exit 1
          fi
          grep -q '## Fix plan' /tmp/ershov-release-soak.txt
          grep -q 'DEEPSEEK_API_KEY=<secret>' /tmp/ershov-release-soak.txt
          if grep -q 'sk-release-do-not-print' /tmp/ershov-release-soak.txt; then
            echo "secret leaked from soak fix-plan"
            exit 1
          fi
          /tmp/ershov-release-smoke/bin/ershov revert --help
          /tmp/ershov-release-smoke/bin/mnemos --help
          /tmp/ershov-release-smoke/bin/nightmem --help
          /tmp/ershov-release-smoke/bin/dreaming --help
          /tmp/ershov-release-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-release-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-release-smoke/bin/python -m hermes_mnemos --help

      - name: Smoke source distribution
        run: |
          python -m venv /tmp/ershov-release-sdist-smoke
          /tmp/ershov-release-sdist-smoke/bin/python -m pip install --upgrade pip
          /tmp/ershov-release-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/ershov-release-sdist-smoke/bin/ershov --help
          /tmp/ershov-release-sdist-smoke/bin/mnemos --help
          /tmp/ershov-release-sdist-smoke/bin/nightmem --help
          /tmp/ershov-release-sdist-smoke/bin/dreaming --help
          /tmp/ershov-release-sdist-smoke/bin/python -m hermes_dreaming --help
          /tmp/ershov-release-sdist-smoke/bin/python -m hermes_ershov --help
          /tmp/ershov-release-sdist-smoke/bin/python -m hermes_mnemos --help

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ershov-dist
          path: dist/*
          if-no-files-found: error

  upload-release-assets:
    name: upload release assets
    runs-on: ubuntu-latest
    needs: build-release-assets
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-ershov-dist
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
